<!DOCTYPE html>
<html>
    <head>
        <title> Sign Up Page </title>
        <link href="css/style.css" rel="stylesheet">
    </head>

    <header>
            <h1> Janaye Jackson </h1>
    </header>
    <hr>
    <body>
        <main>
        <h1> Sign Up </h1>
        <form id="signupForm" action="welcome.html">
        First Name: <input type="text" name="fName"><br>
        Last Name: <input type="text" name="lName"><br>
        <div id="gender-options"> 
        Gender: 
            <label><input type="radio" name="gender" value="m">Male</label>
            <label><input type="radio" name="gender" value="f">Female</label><br>	
        </div> 
        Zip Code:  <input type="text" id="zip" name="zip"><br><span id="zipError"></span>
        City:   <span id="city"></span> <br>
        Latitude:  <span id="latitude"></span><br>
        Longitude: <span id="longitude"></span><br><br>

        State: 
        <select id="state" name="state">
            <option>Select One</option>
            <option value="ca">California</option>
            <option value="ny">New York</option>
	        <option value="tx">Texas</option>
        </select> <br>
        
        Select a County: <select id="county"></select><br>
        
        Desired Username: 
        <input type="text" id="username" ><br>
        <span id="userAlert"></span><br>

        Password: <input type="password" id="password">
        <div id="show">Suggested Password: <span id="suggestedPwd"></span></div><br>
        Type Password Again: <input type="password" id="retypePass"><br>
        <span id="passwordError"></span> 

        <input type="submit" id="submit" value="Sign up!">
        </form>
        </main>

        <footer>
            <hr>
            <img id="foot" src="img/CSUMBLogo.png" alt="Picture of CSUMB Logo"><br>
            CST336 Internet Programming. 2026&copy; Jackson <br>
            <strong>Disclaimer:</strong> The information is for academic purposes only
        </footer>
        <script src="js/script.js"></script>
        
        <script src="js/script.js"></script>
    </body>
</html>
